{% extends "base.html" %}
{% block title %}Permissões do Usuário{% endblock %}

{% block content %}
<div class="container mt-4">

    <h3>Permissões - {{ usuario.usuario }}</h3>

    <form method="POST">

        <div class="row">
            {% for p in permissoes %}
            <div class="col-md-4">
                <div class="form-check mb-2">
                    <input class="form-check-input"
                           type="checkbox"
                           name="permissoes"
                           value="{{ p.id }}"
                           {% if p.id in permissoes_usuario %}checked{% endif %}>
                    <label class="form-check-label">
                        {{ p.codigo }} <br>
                        <small class="text-muted">{{ p.descricao }}</small>
                    </label>
                </div>
            </div>
            {% endfor %}
        </div>

        <hr>

        <button type="submit" class="btn btn-primary">
            Salvar Permissões
        </button>
        <a href="/usuarios" class="btn btn-secondary">
            Voltar
        </a>

    </form>

</div>
{% endblock %}
