{% extends "base.html" %}
{% block title %}Novo Usuário{% endblock %}

{% block content %}
<div class="container mt-4">

  <div class="card bg-black border-secondary">
    <div class="card-body">

      <h4 class="mb-4 text-white fw-bold">Criar Novo Usuário</h4>

      <form method="POST">

        <div class="mb-3">
          <label class="form-label text-white fw-bold">Usuário</label>
          <input type="text" name="usuario" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label text-white fw-bold">Senha</label>
          <input type="password" name="senha" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label text-white fw-bold">Perfil</label>
          <select name="perfil" class="form-select" required>
            <option value="OPERADOR">OPERADOR</option>
            <option value="ADMIN">ADMIN</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label text-white fw-bold">Empresa</label>
          <select name="empresa_id" class="form-select" required>
            {% for e in empresas %}
              <option value="{{ e.id }}">{{ e.nome }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" name="pode_multiempresa">
          <label class="form-check-label text-white fw-bold">
            Pode acessar múltiplas empresas
          </label>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success">
            Criar Usuário
          </button>
          <a href="/usuarios" class="btn btn-outline-light">
            Cancelar
          </a>
        </div>

      </form>

    </div>
  </div>

</div>
{% endblock %}
